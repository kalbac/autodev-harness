name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      # Typecheck covers src/ AND test/ (tsconfig.typecheck.json) -- proves the
      # cross-platform PowerShell lock is gone and test/ is not vacuously green.
      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # Build + postbuild asset copy, then assert the critic schema landed in
      # dist/ (gotcha [critic/codex]: tsc does not copy the .json; a compiled
      # critic's --output-schema path would break without the postbuild step).
      - name: Build
        run: npm run build

      - name: Assert critic schema copied into dist
        run: node -e "require('node:fs').accessSync('dist/critic/critic-verdict.schema.json')"
