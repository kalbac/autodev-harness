name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      # Typecheck covers src/ AND test/ (tsconfig.typecheck.json) -- proves the
      # cross-platform PowerShell lock is gone and test/ is not vacuously green.
      - name: Typecheck
        run: npm run typecheck

      # Build + postbuild asset copy, then assert the critic schema landed in
      # dist/ (gotcha [critic/codex]: tsc does not copy the .json; a compiled
      # critic's --output-schema path would break without the postbuild step).
      #
      # Build runs BEFORE the tests, not after: the profile suite asserts that
      # `harnessRoot()` resolves identically from a COMPILED dist/ module, which
      # is the test that exists to defeat the same class of bug the schema
      # assertion below covers (green in tests, dead in the running daemon --
      # gotcha [critic/codex] again). With the old order that test could only
      # ever fail on a clean runner, since dist/ did not exist yet. Making the
      # test tolerate a missing dist/ would have deleted its whole purpose.
      - name: Build
        run: npm run build

      - name: Assert critic schema copied into dist
        run: node -e "require('node:fs').accessSync('dist/critic/critic-verdict.schema.json')"

      - name: Test
        run: npm test
